name: Benchmark Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  benchmark:
    name: Certified benchmark checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run benchmark suite
        shell: bash
        run: |
          set -o pipefail
          mkdir -p benchmark-results
          npm run publish-downloads 2>&1 | tee benchmark-results/publish-downloads.log
          npm run test:certified 2>&1 | tee benchmark-results/test-certified.log
          npm run test:benchmark 2>&1 | tee benchmark-results/test-benchmark.log
          npm run build 2>&1 | tee benchmark-results/build.log

      - name: Upload benchmark logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results/
          if-no-files-found: warn
