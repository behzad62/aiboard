server {
    listen 80;
    listen [::]:80;
    server_name aiboard.me www.aiboard.me;

    root /var/www/aiboard.me;
    index index.html;

    location /_next/static/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
